<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITRO - Quản lý nhà cho thuê</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            color: #333;
        }

        /* Header & Navigation */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            background-color: #fff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #ff6b35;
        }

        nav {
            display: flex;
            gap: 40px;
            align-items: center;
            flex: 1;
            margin-left: 80px;
        }

        nav a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            font-size: 14px;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #ff6b35;
        }

        .auth-buttons {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .login-btn {
            color: #ff6b35;
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }

        .signup-btn {
            padding: 10px 25px;
            border: 2px solid #ff6b35;
            color: #ff6b35;
            text-decoration: none;
            border-radius: 25px;
            font-weight: 500;
            transition: all 0.3s;
            cursor: pointer;
        }

        .signup-btn:hover {
            background-color: #ff6b35;
            color: white;
        }

        /* Hero Section */
        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #fafafa 0%, #f5f5f5 100%);
            overflow: hidden;
        }

        /* Decorative Shapes */
        .hero::before {
            content: '';
            position: absolute;
            top: -10%;
            right: 10%;
            width: 600px;
            height: 600px;
            background: linear-gradient(135deg, rgba(255, 200, 100, 0.3) 0%, rgba(255, 100, 50, 0.2) 100%);
            clip-path: polygon(100% 0%, 0% 100%, 100% 100%);
            z-index: 1;
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 600px;
            height: 400px;
            background: #ff9966;
            clip-path: polygon(0% 0%, 100% 50%, 100% 100%, 0% 100%);
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 900px;
            padding: 0 30px;
        }

        .banner-alert {
            display: inline-block;
            background: linear-gradient(90deg, #ff1493, #ff6b9d);
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            margin-bottom: 40px;
            font-size: 15px;
            font-weight: 500;
            animation: slideInDown 0.6s ease-out;
        }

        .banner-alert::after {
            content: ' →';
            margin-left: 8px;
        }

        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 56px;
            font-weight: 700;
            color: #2c3e50;
            line-height: 1.2;
            margin-bottom: 30px;
            animation: slideInUp 0.8s ease-out 0.2s both;
        }

        .hero-subtitle {
            font-size: 18px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 50px;
            animation: slideInUp 0.8s ease-out 0.4s both;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .cta-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 80px;
            animation: slideInUp 0.8s ease-out 0.6s both;
        }

        .btn-primary {
            padding: 16px 50px;
            background: linear-gradient(135deg, #ff8855, #ff6b35);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(255, 107, 53, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 53, 0.4);
        }

        .btn-secondary {
            padding: 16px 50px;
            background: white;
            color: #333;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-secondary:hover {
            border-color: #ff6b35;
            color: #ff6b35;
        }

        .app-preview {
            position: relative;
            z-index: 10;
            animation: slideInUp 0.8s ease-out 0.8s both;
        }

        .app-preview img {
            max-width: 100%;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            max-width: 600px;
            width: 100%;
        }

        /* Responsive */
        @media (max-width: 768px) {
            header {
                padding: 15px 30px;
                flex-wrap: wrap;
            }

            nav {
                margin-left: 0;
                gap: 20px;
                flex-basis: 100%;
                margin-top: 15px;
                font-size: 12px;
            }

            h1 {
                font-size: 36px;
            }

            .hero-subtitle {
                font-size: 15px;
            }

            .cta-buttons {
                flex-direction: column;
                gap: 15px;
            }

            .btn-primary,
            .btn-secondary {
                width: 100%;
            }

            .logo {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="logo">2Duy</div>
        <nav>
            <a href="dichvu.html">Dịch vụ</a>
            <a href="phong.html">Phòng</a>
            <a href="khachthue.html">Khách Thuê</a>
            <a href="hopdong.html">Hợp đồng</a>
            <a href="hoadon.html">Hóa đơn</a>
            <a href="taikhoan.html">Tài khoản</a>
        </nav>
        <div class="auth-buttons" id="auth-links">
            <a href="dangnhap.html" class="login-btn">ĐĂNG NHẬP</a>
            <a href="dangky.html" class="signup-btn">ĐĂNG KÝ</a>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <div class="banner-alert">
                Nhanh tay đăng ký để tận hưởng ưu đãi từ ITRO
            </div>

            <h1>QUẢN LÝ NHÀ CHO THUÊ<br>CÙNG ITRO</h1>

            <p class="hero-subtitle">
                Giúp bạn quản lý nhà trọ, kí túc xá, homestay, kiot...<br>
                một cách chuyên nghiệp thay thế cho quản lý số sách, excel
            </p>

            <div class="app-preview">
                <img src="https://quanlynhatro.com/quanlynhatro/assets/img/itro-devices.png" alt="ITRO App Preview">
            </div>
        </div>
    </section>
    <script>
        const sessionKey = 'itro_currentUser';

        function getCurrentUser() {
            try {
                return JSON.parse(localStorage.getItem(sessionKey) || 'null');
            } catch {
                return null;
            }
        }

        function requireLogin() {
            const current = getCurrentUser();
            if (!current || !current.username) {
                window.location.href = 'dangnhap.html';
            }
        }

        function logout() {
            localStorage.removeItem(sessionKey);
            window.location.href = 'dangnhap.html';
        }

        function renderHeader() {
            const authLinks = document.getElementById('auth-links');
            const user = getCurrentUser();
            if (!authLinks) return;
            if (user && user.username) {
                authLinks.innerHTML = `
                    <span style="font-weight:600; color:#333; margin-right:12px;">Xin chào, ${user.username}</span>
                    <a href="#" onclick="logout()" class="login-btn" style="border-color:#ff6b35;">Đăng xuất</a>
                `;
            } else {
                authLinks.innerHTML = `
                    <a href="dangnhap.html" class="login-btn">ĐĂNG NHẬP</a>
                    <a href="dangky.html" class="signup-btn">ĐĂNG KÝ</a>
                `;
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            requireLogin();
            renderHeader();
        });
    </script>
</body>
</html>
