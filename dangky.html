<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ITRO - Đăng ký</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #fbf6ff 0%, #f4f8ff 100%);
            color: #333;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 18px;
            padding: 40px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
        }

        .brand {
            text-align: center;
            margin-bottom: 30px;
        }

        .brand h1 {
            font-size: 26px;
            color: #ff6b35;
            margin-bottom: 8px;
        }

        .brand p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid #ddd;
            font-size: 15px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            background: linear-gradient(135deg, #ff8855, #ff6b35);
            color: white;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(255, 107, 53, 0.25);
        }

        .meta {
            margin-top: 16px;
            font-size: 14px;
            text-align: center;
            color: #555;
        }

        .meta a {
            color: #ff6b35;
            text-decoration: none;
            font-weight: 600;
        }

        .notice {
            margin-bottom: 18px;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid #f0c0c0;
            background: #fff3f3;
            color: #9c1c1c;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand">
            <h1>Đăng ký</h1>
            <p>Tạo tài khoản để sử dụng ITRO</p>
        </div>

        <div class="notice" id="notice"></div>

        <div class="form-group">
            <label for="username">Tên đăng nhập</label>
            <input id="username" type="text" placeholder="Nhập tên đăng nhập" />
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="Nhập email" />
        </div>

        <div class="form-group">
            <label for="password">Mật khẩu</label>
            <input id="password" type="password" placeholder="Nhập mật khẩu" />
        </div>

        <div class="form-group">
            <label for="password-confirm">Xác nhận mật khẩu</label>
            <input id="password-confirm" type="password" placeholder="Nhập lại mật khẩu" />
        </div>

        <button class="btn" onclick="register()">Đăng ký</button>

        <div class="meta">
            Đã có tài khoản? <a href="dangnhap.html">Đăng nhập</a> · <a href="trangchinh.html">Trang chính</a> · <a href="hopdong.html">Hợp đồng</a>
        </div>
    </div>

    <script>
        const accountsKey = 'itro_accounts';
        const sessionKey = 'itro_currentUser';

        function getSavedAccounts() {
            try {
                const raw = localStorage.getItem(accountsKey);
                return raw ? JSON.parse(raw) : [];
            } catch {
                return [];
            }
        }

        function setSession(username) {
            localStorage.setItem(sessionKey, JSON.stringify({ username }));
        }

        function showNotice(message) {
            const notice = document.getElementById('notice');
            notice.innerText = message;
            notice.style.display = 'block';
            setTimeout(() => {
                notice.style.display = 'none';
            }, 3500);
        }

        function saveAccounts(accounts) {
            localStorage.setItem(accountsKey, JSON.stringify(accounts));
        }

        function register() {
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('password-confirm').value;

            if (!username || !email || !password || !passwordConfirm) {
                showNotice('Vui lòng điền đầy đủ thông tin.');
                return;
            }

            if (password !== passwordConfirm) {
                showNotice('Mật khẩu không khớp.');
                return;
            }

            const accounts = getSavedAccounts();
            const exists = accounts.some((a) => a.username === username);
            if (exists) {
                showNotice('Tên đăng nhập đã tồn tại.');
                return;
            }

            accounts.push({
                username,
                email,
                password,
                role: 'user',
                status: 'active',
            });

            saveAccounts(accounts);
            setSession(username);
            window.location.href = 'trangchinh.html';
        }

        function checkLoggedIn() {
            try {
                const current = JSON.parse(localStorage.getItem(sessionKey) || 'null');
                if (current && current.username) {
                    window.location.href = 'trangchinh.html';
                }
            } catch {
                // Ignore invalid session data
            }
        }

        window.addEventListener('DOMContentLoaded', checkLoggedIn);
    </script>
</body>
</html>
